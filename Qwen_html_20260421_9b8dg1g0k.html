<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .game-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .score {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }
        
        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .choice-btn {
            font-size: 60px;
            padding: 20px;
            border: 3px solid #ddd;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .choice-btn:hover {
            transform: scale(1.1);
            border-color: #667eea;
            background: #f0f0ff;
        }
        
        .result {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
            min-height: 30px;
        }
        
        .result.win { color: #4CAF50; }
        .result.lose { color: #f44336; }
        .result.tie { color: #ff9800; }
        
        .computer-choice {
            font-size: 40px;
            margin: 20px 0;
            min-height: 50px;
        }
        
        .reset-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .reset-btn:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎮 Rock Paper Scissors</h1>
        <div class="score">
            You: <span id="playerScore">0</span> | 
            Computer: <span id="computerScore">0</span>
        </div>
        
        <div class="choices">
            <button class="choice-btn" onclick="play('rock')">🪨</button>
            <button class="choice-btn" onclick="play('paper')">📄</button>
            <button class="choice-btn" onclick="play('scissors')">✂️</button>
        </div>
        
        <div class="computer-choice" id="computerChoice"></div>
        <div class="result" id="result">Choose your weapon!</div>
        
        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script>
        let playerScore = 0;
        let computerScore = 0;
        
        const choices = ['rock', 'paper', 'scissors'];
        const emojis = {
            rock: '🪨',
            paper: '📄',
            scissors: '✂️'
        };
        
        function play(playerChoice) {
            const computerChoice = choices[Math.floor(Math.random() * 3)];
            
            document.getElementById('computerChoice').innerHTML = 
                `Computer chose: ${emojis[computerChoice]}`;
            
            let result = '';
            let resultClass = '';
            
            if (playerChoice === computerChoice) {
                result = "It's a tie! 🤝";
                resultClass = 'tie';
            } else if (
                (playerChoice === 'rock' && computerChoice === 'scissors') ||
                (playerChoice === 'paper' && computerChoice === 'rock') ||
                (playerChoice === 'scissors' && computerChoice === 'paper')
            ) {
                result = 'You win! 🎉';
                resultClass = 'win';
                playerScore++;
            } else {
                result = 'Computer wins! 😢';
                resultClass = 'lose';
                computerScore++;
            }
            
            const resultElement = document.getElementById('result');
            resultElement.textContent = result;
            resultElement.className = 'result ' + resultClass;
            
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }
        
        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            document.getElementById('result').textContent = 'Choose your weapon!';
            document.getElementById('result').className = 'result';
            document.getElementById('computerChoice').innerHTML = '';
        }
    </script>
</body>
</html>
